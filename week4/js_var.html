<!DOCTYPE html>
<html>
    <head>
        <title>JS_Variables</title>
    </head>
    <body>
        <script>
            let x = 173;
            var y = "Mustafa";
            const z = {"sem" : 4, "dept" : "IT"};

            alert("Check console for Output");

            console.log("Number : ",x);
            console.log("String : ",y);
            console.log("Object : \nSem : ",z.sem,"\nDept : ",z.dept);

            if(true){
                let x1 = 168;
                y = "Duurga";
                const z1 = {"sem" : 4, "dept" : "IT-3"};

                console.log("Block Speciifc Variables : ");
                
                console.log("Number(x1) : ",x1);
                console.log("String(y) : ",y);
                console.log("Object(z1) : \nSem : ",z1.sem,"\nDept : ",z1.dept);
            }

            x = 737173;
            y = "Ghulam Mustafa";
            z.sem = "IV";
            z.dept = "IT-3";
            // console.log(x1);
            // console.log(y1);
            // console.log(z1);
            console.log("Object : \nSem : ",z.sem,"\nDept : ",z.dept);

            console.log("x Type : ",typeof x);
            console.log("y Type : ",typeof y);
            console.log("z Type : ",typeof z);
        </script>
    </body>
</html>
