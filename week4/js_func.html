<!DOCTYPE html>
<html>
    <head>
        <title>JS_Functions</title>
    </head>
    <body>
        <script>
            alert("Check console for O/P");
            function isPalindrome(s){
                var n = s.length;
                var i=0,j=n-1;
                while(i<=s.length/2){
                    if(s[i] != s[j]){
                        return false;
                    }
                    i++;
                    j--;
                }
                return true;
            }

            let s1 = prompt("Enter a String : ");
            if(isPalindrome(s1)){
                console.log("Palindrome");
            }
            else{
                console.log("Not Palindome");
            }
        </script>
    </body>
</html>
