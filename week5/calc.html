<!DOCTYPE html>
<html>
<head>
    <title>Simple Calculator</title>
    <style>
        body {
            font-family: Arial;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f4f4f4;
        }


        .calculator {
            background: rgb(27, 26, 26);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }


        #display {
            width: 100%;
            height: 40px;
            margin-bottom: 10px;
            font-size: 18px;
            text-align: right;
            padding-right: 10px;
            background: white;
            border: 2px solid black;
        }


        button {
            width: 50px;
            height: 40px;
            margin: 5px;
            font-size: 18px;
            cursor: pointer;
        }


        .row {
            text-align: center;
        }
    </style>
</head>
<body>

    <h3 style="text-align: center;">160124737173</h3>

<div class="calculator">
    <input type="text" id="display" disabled>


    <div class="row">
        <button onclick="clearDisplay()" style="background-color:red;color:#f4f4f4">C</button>
        <button onclick="del()" style="background-color: blue; color: #f4f4f4;">DEL</button>
        <button onclick="appendValue('/')">/</button>
        <button onclick="appendValue('*')">*</button>
        
    </div>


    <div class="row">
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('-')">-</button>
        
    </div>


    <div class="row">
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('+')">+</button>
        
    </div>


    <div class="row">
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="calculate()" style="background-color: green; color: #f4f4f4;">=</button>
    </div>

    <div class="row">
        <button onclick="appendValue('00')">00</button>
        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
    </div>
</div>


<script>
    function appendValue(value) {
        document.getElementById("display").value += value;
    }


    function clearDisplay() {
        document.getElementById("display").value = "";
    }

    function del() {
        let val = document.getElementById("display").value;
        document.getElementById("display").value = val.slice(0, -1);
    }


    function calculate() {
        let display = document.getElementById("display");
        try {
            display.value = eval(display.value);
        } catch {
            display.value = "Error";
        }
    }
</script>


</body>
</html>
